kind = "web"
previewPath = "/"
title = "Ice Media Entertainment"
version = "1.0.0"
id = "artifacts/ime-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22036

[services.development]
run = "pnpm --filter @workspace/ime-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ime-website", "run", "build" ]
publicDir = "artifacts/ime-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22036"
BASE_PATH = "/"
